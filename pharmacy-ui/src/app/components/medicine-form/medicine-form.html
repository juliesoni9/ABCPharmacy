<form class="medicine-form" (ngSubmit)="onSubmit()">
  <h2>Add New Medicine</h2>

  @if (error) {
    <div class="form-error">{{ error }}</div>
  }

  <div class="form-grid">
    <div class="form-group">
      <label for="fullName">Full Name *</label>
      <input id="fullName" type="text" [(ngModel)]="form.fullName" name="fullName" required />
    </div>

    <div class="form-group">
      <label for="brand">Brand *</label>
      <input id="brand" type="text" [(ngModel)]="form.brand" name="brand" required />
    </div>

    <div class="form-group">
      <label for="expiryDate">Expiry Date *</label>
      <input id="expiryDate" type="date" [(ngModel)]="form.expiryDate" name="expiryDate" required />
    </div>

    <div class="form-group">
      <label for="quantity">Quantity</label>
      <input id="quantity" type="number" min="0" [(ngModel)]="form.quantity" name="quantity" />
    </div>

    <div class="form-group">
      <label for="price">Price (₹)</label>
      <input
        id="price"
        type="number"
        min="0"
        step="0.01"
        [(ngModel)]="form.price"
        name="price"
      />
    </div>

    <div class="form-group form-group-full">
      <label for="notes">Notes</label>
      <textarea id="notes" rows="3" [(ngModel)]="form.notes" name="notes"></textarea>
    </div>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary" [disabled]="submitting">
      {{ submitting ? 'Saving...' : 'Save Medicine' }}
    </button>
    <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancel</button>
  </div>
</form>
